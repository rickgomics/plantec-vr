<style>
  html,body{margin:0;height:100%;background:#0a0812;overflow:hidden;font-family:'Montserrat',system-ui,sans-serif;}
  #boot{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;
        background:radial-gradient(circle at 50% 40%,#231133 0%,#0a0812 70%);color:#e8fff4;transition:opacity .6s;}
      #boot{gap:18px;} #vstamp{opacity:.45;font-size:11px;color:#fff;margin:0;}
  #bar{width:min(60vw,300px);height:6px;background:#241a2e;border-radius:4px;margin-top:16px;overflow:hidden;}
  #bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,#A21585,#00A99D,#F5A800);transition:width .2s;}
  #boot button{pointer-events:auto;font-family:inherit;font-weight:800;letter-spacing:.5px;cursor:pointer;
       border-radius:14px;padding:16px 26px;font-size:15px;backdrop-filter:blur(8px);transition:.15s;}
  #btn-vr{background:linear-gradient(90deg,#A21585,#00A99D);color:#fff;border:none;box-shadow:0 10px 34px rgba(162,21,133,.4);}
  #landlogo{pointer-events:none;width:min(66vw,400px);filter:drop-shadow(0 6px 24px rgba(0,0,0,.5));}
  #landtitle{pointer-events:none;color:#fff;font-weight:700;font-size:15px;letter-spacing:.4px;opacity:.9;margin:2px 0 6px;}
  #btn-vr:active{transform:scale(.97);}
  #xrstatus{pointer-events:none;color:#e8d5f0;font-size:12px;opacity:.85;max-width:280px;text-align:center;line-height:1.5;
       background:rgba(3,20,16,.5);padding:8px 12px;border-radius:10px;}
  #boot button[disabled]{opacity:.35;cursor:not-allowed;}
  /* 2D HUD for phone / desktop */
  #hud{position:fixed;left:0;right:0;bottom:0;z-index:50;display:flex;align-items:center;justify-content:center;gap:14px;
       padding:12px;pointer-events:none;}
  #hud button{pointer-events:auto;background:rgba(0,169,157,.18);border:1px solid #00A99D;color:#eafff4;
       font-size:22px;width:52px;height:52px;border-radius:14px;cursor:pointer;backdrop-filter:blur(6px);}
  #hud button:active{background:rgba(0,169,157,.4);}
  #hud-counter{pointer-events:none;color:#ffe3b0;font-size:14px;font-weight:700;min-width:64px;text-align:center;
       background:rgba(3,20,16,.55);padding:8px 12px;border-radius:10px;border:1px solid rgba(245,168,0,.4);}
  #topbar{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;justify-content:space-between;align-items:center;
       padding:12px 16px;pointer-events:none;color:#eafff4;}
  #topbar .brand{font-weight:800;letter-spacing:2px;font-size:14px;}
  #topbar .brand b{color:#00d16a;}
  #topbar .hint{font-size:11px;opacity:.6;text-align:right;line-height:1.4;}
  @media(max-width:600px){#topbar .hint{max-width:150px;}}
</style>
<script src="assets/aframe.min.js"></script>

<script>// ---------- Grid floor texture ----------
function makeGrid(){
  var c=document.createElement('canvas');c.width=c.height=512;var x=c.getContext('2d');
  x.fillStyle='#07131a';x.fillRect(0,0,512,512);
  x.strokeStyle='rgba(0,166,81,0.28)';x.lineWidth=2;
  for(var i=0;i<=512;i+=64){x.beginPath();x.moveTo(i,0);x.lineTo(i,512);x.stroke();x.beginPath();x.moveTo(0,i);x.lineTo(512,i);x.stroke();}
  return c.toDataURL();
}

// ---------- Deck carousel component ----------
AFRAME.registerComponent('deck', {
  init: function () {
    var self = this;
    this.index = 0;
    this.total = window.SLIDES.length;
    this.busy = false;
    this.planes = ['p-l2','p-l1','p-c','p-r1','p-r2'].map(function(id){return document.getElementById(id);});
    this.layouts = [
      {off:-2, pos:{x:-4.9,y:1.6,z:-5.2}, rotY: 40, s:0.42, op:0.30},
      {off:-1, pos:{x:-2.85,y:1.6,z:-4.05}, rotY: 25, s:0.62, op:0.60},
      {off: 0, pos:{x:0,y:1.6,z:-3.25}, rotY: 0,  s:1.00, op:1.00},
      {off: 1, pos:{x:2.85,y:1.6,z:-4.05}, rotY:-25, s:0.62, op:0.60},
      {off: 2, pos:{x:4.9,y:1.6,z:-5.2}, rotY:-40, s:0.42, op:0.30}
    ];
    window.DECK = this;
    this.render();
    // Keyboard (desktop)
    window.addEventListener('keydown', function (e) {
      if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { self.next(); e.preventDefault(); }
      else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { self.prev(); e.preventDefault(); }
      else if (e.key === 'Home') { self.goto(0); }
      else if (e.key === 'End') { self.goto(self.total-1); }
    });
  },
  next: function () { if (this.index < this.total - 1) { this.index++; this.render(); if(window.AUDIO) window.AUDIO.whoosh(1); } },
  prev: function () { if (this.index > 0) { this.index--; this.render(); if(window.AUDIO) window.AUDIO.whoosh(-1); } },
  goto: function (i) { if (i>=0 && i<this.total){ this.index=i; this.render(); } },
  render: function () {
    var self = this;
    this.planes.forEach(function (pl, k) {
      var L = self.layouts[k];
      var si = self.index + L.off;
      if (si < 0 || si >= self.total) { pl.setAttribute('visible', false); return; }
      pl.setAttribute('visible', true);
      pl.setAttribute('position', L.pos);
      pl.setAttribute('rotation', {x:0, y:L.rotY, z:0});
      pl.setAttribute('scale', {x:L.s, y:L.s, z:L.s});
      pl.setAttribute('material', 'src', '#img' + si);
      pl.setAttribute('material', 'opacity', L.op);
    });
    if (window.NARR) window.NARR.play(this.index);
    var ctr = document.getElementById('counter');
    if (ctr) ctr.setAttribute('text', 'value', (this.index+1) + '  /  ' + this.total);
    // sync 2D hud
    var h = document.getElementById('hud-counter');
    if (h) h.textContent = (this.index+1) + ' / ' + this.total;
  }
});

// ---------- Controller navigation ----------
AFRAME.registerComponent('nav-controller', {
  init: function () {
    var self = this;
    this.cool = 0;
    var el = this.el;
    function uiAction(){
      var rc = el.components && el.components.raycaster;
      var els = rc && rc.intersectedEls;
      if(!els || !els.length) return false;
      var t = els[0];
      var guard = 0;
      while(t && guard++ < 6){
        if(t.components && t.components['theme-pick']){
          if(window.SET_THEME) window.SET_THEME(t.components['theme-pick'].data.name);
          if(window.AUDIO) window.AUDIO.whoosh(1);
          return true;
        }
        if(t.components && t.components['narr-toggle']){
          if(window.NARR) window.NARR.toggle();
          return true;
        }
        if(t.components && t.components['arrow-btn']){
          var d = t.components['arrow-btn'].data.dir;
          if(window.DECK){ if(d==='next'){window.DECK.next();} else {window.DECK.prev();} }
          return true;
        }
        t = t.parentEl;
      }
      return true; // laser sobre algo clicavel: nao troca slide
    }
    el.addEventListener('triggerdown', function(){
      if(window.AUDIO){window.AUDIO.start();window.AUDIO.resume();}
      if(uiAction()) return;
      if(window.DECK) window.DECK.next();
    });
    el.addEventListener('gripdown',    function(){ if(window.DECK) window.DECK.prev(); });
    el.addEventListener('abuttondown', function(){ if(uiAction()) return; if(window.DECK) window.DECK.next(); });
    el.addEventListener('bbuttondown', function(){ if(window.DECK) window.DECK.prev(); });
    el.addEventListener('xbuttondown', function(){ if(window.DECK) window.DECK.prev(); });
    el.addEventListener('ybuttondown', function(){ if(window.DECK) window.DECK.next(); });
    el.addEventListener('thumbstickmoved', function (e) {
      var now = performance.now();
      if (now - self.cool < 400) return;
      if (e.detail.x > 0.65) { window.DECK && window.DECK.next(); self.cool = now; }
      else if (e.detail.x < -0.65) { window.DECK && window.DECK.prev(); self.cool = now; }
      else if (e.detail.y > 0.65 || e.detail.y < -0.65) { if(window.CYCLE_THEME){ window.CYCLE_THEME(); self.cool = now; } }
    });
  }
});

// ---------- Procedural audio: musica generativa + natureza + whoosh ----------
(function(){
  var ctx=null, master=null, enabled=false, timers=[];
  function later(fn, ms){ timers.push(setTimeout(fn, ms)); }
  function ensure(){
    if(ctx) return;
    var AC = window.AudioContext||window.webkitAudioContext; if(!AC) return;
    ctx = new AC();
    master = ctx.createGain(); master.gain.value = 0.55; master.connect(ctx.destination);

    // --- espaco/eco compartilhado (delay com feedback) ---
    var wet = ctx.createGain(); wet.gain.value = 0.35; wet.connect(master);
    var dly = ctx.createDelay(2.0); dly.delayTime.value = 0.45;
    var fb  = ctx.createGain(); fb.gain.value = 0.42;
    dly.connect(fb); fb.connect(dly); dly.connect(wet);
    var toSpace = ctx.createGain(); toSpace.gain.value = 1.0; toSpace.connect(dly);

    // --- MUSICA: pentatonica suave, notas lentas + drone ---
    var musicG = ctx.createGain(); musicG.gain.value = 0.16; musicG.connect(master);
    var scale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33];
    function note(){
      if(!enabled) { later(note, 1500); return; }
      var t = ctx.currentTime;
      var f = scale[Math.floor(Math.random()*scale.length)];
      if(Math.random()<0.3) f = f/2;
      var o = ctx.createOscillator(); o.type='sine'; o.frequency.value=f;
      var o2 = ctx.createOscillator(); o2.type='triangle'; o2.frequency.value=f*2; 
      var g = ctx.createGain(); g.gain.setValueAtTime(0.0001,t);
      var dur = 2.2 + Math.random()*1.6;
      g.gain.exponentialRampToValueAtTime(0.5, t+0.6);
      g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
      var g2 = ctx.createGain(); g2.gain.value = 0.12;
      o.connect(g); o2.connect(g2); g2.connect(g);
      g.connect(musicG); g.connect(toSpace);
      o.start(t); o.stop(t+dur+0.1); o2.start(t); o2.stop(t+dur+0.1);
      later(note, (2.4 + Math.random()*2.8)*1000);
    }
    note();
    // drone grave sutil sob a musica
    var dr = ctx.createOscillator(); dr.type='sine'; dr.frequency.value=130.81;
    var drG = ctx.createGain(); drG.gain.value=0.05; dr.connect(drG); drG.connect(master); dr.start();

    // --- NATUREZA: vento (ruido filtrado respirando) ---
    var nbuf = ctx.createBuffer(1, ctx.sampleRate*3, ctx.sampleRate);
    var nd = nbuf.getChannelData(0);
    for(var i=0;i<nd.length;i++) nd[i]=(Math.random()*2-1);
    var wind = ctx.createBufferSource(); wind.buffer=nbuf; wind.loop=true;
    var wf = ctx.createBiquadFilter(); wf.type='bandpass'; wf.frequency.value=400; wf.Q.value=0.6;
    var wg = ctx.createGain(); wg.gain.value=0.07;
    wind.connect(wf); wf.connect(wg); wg.connect(master); wind.start();
    var wlfo = ctx.createOscillator(); wlfo.frequency.value=0.05;
    var wlg = ctx.createGain(); wlg.gain.value=0.045; wlfo.connect(wlg); wlg.connect(wg.gain); wlfo.start();
    var flfo = ctx.createOscillator(); flfo.frequency.value=0.08;
    var flg = ctx.createGain(); flg.gain.value=220; flfo.connect(flg); flg.connect(wf.frequency); flfo.start();

    // --- NATUREZA: passaros (chirps FM aleatorios) ---
    function chirp(){
      if(!enabled) { later(chirp, 2000); return; }
      var t = ctx.currentTime;
      var n = 2 + Math.floor(Math.random()*4);   // notas no canto
      var base = 2200 + Math.random()*1800;
      for(var k=0;k<n;k++){
        var st = t + k*(0.09+Math.random()*0.09);
        var o = ctx.createOscillator(); o.type='sine';
        var f1 = base*(0.9+Math.random()*0.25);
        o.frequency.setValueAtTime(f1, st);
        o.frequency.exponentialRampToValueAtTime(f1*(1.1+Math.random()*0.5), st+0.05);
        o.frequency.exponentialRampToValueAtTime(f1*0.85, st+0.11);
        var g = ctx.createGain(); g.gain.setValueAtTime(0.0001, st);
        g.gain.exponentialRampToValueAtTime(0.16+Math.random()*0.1, st+0.015);
        g.gain.exponentialRampToValueAtTime(0.0001, st+0.13);
        // pan aleatorio para sensacao de espaco
        var p = ctx.createStereoPanner ? ctx.createStereoPanner() : null;
        o.connect(g);
        if(p){ p.pan.value = Math.random()*1.6-0.8; g.connect(p); p.connect(master); p.connect(toSpace); }
        else { g.connect(master); g.connect(toSpace); }
        o.start(st); o.stop(st+0.2);
      }
      later(chirp, (2.5 + Math.random()*6)*1000);
    }
    later(chirp, 1200);
  }
  window.AUDIO = {
    duck: function(on){ if(master) master.gain.linearRampToValueAtTime(on?0.16:0.55, ctx.currentTime+0.4); },
    resume: function(){ if(ctx&&ctx.state!=='running'){ ctx.resume(); } },
    start: function(){ ensure(); if(ctx&&ctx.state!=='running') ctx.resume(); enabled=true; },
    whoosh: function(dir){
      if(!enabled||!ctx) return;
      if(ctx.state!=='running'){ try{ctx.resume();}catch(e){} }
      var t=ctx.currentTime;
      var o=ctx.createOscillator(); o.type='triangle';
      o.frequency.setValueAtTime(dir>0?220:440,t);
      o.frequency.exponentialRampToValueAtTime(dir>0?440:220,t+0.18);
      var g=ctx.createGain(); g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(0.7,t+0.03);
      g.gain.exponentialRampToValueAtTime(0.0001,t+0.35);
      o.connect(g); g.connect(master); o.start(t); o.stop(t+0.4);
      var buf=ctx.createBuffer(1, ctx.sampleRate*0.3, ctx.sampleRate);
      var d=buf.getChannelData(0); for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
      var s=ctx.createBufferSource(); s.buffer=buf;
      var f=ctx.createBiquadFilter(); f.type='bandpass';
      f.frequency.setValueAtTime(dir>0?600:1400,t);
      f.frequency.exponentialRampToValueAtTime(dir>0?1600:500,t+0.25);
      var ng=ctx.createGain(); ng.gain.value=0.5;
      s.connect(f); f.connect(ng); ng.connect(master); s.start(t);
    }
  };
})();

// ---------- Plantec cube: logo 3D real ----------
AFRAME.registerComponent('plantec-cube', {
  init: function () {
    var T = AFRAME.THREE;
    var group = new T.Group();
    var size = 0.30, gap = 0.05, off = (size + gap) / 2;
    var teal   = new T.MeshStandardMaterial({color: 0x00a99d, roughness: 0.35, metalness: 0.15});
    var yellow = new T.MeshStandardMaterial({color: 0xf5a800, roughness: 0.35, metalness: 0.15});
    var purple = new T.MeshStandardMaterial({color: 0xa21585, roughness: 0.35, metalness: 0.15});
    var dark   = new T.MeshStandardMaterial({color: 0x101418, roughness: 0.9});
    [-1, 1].forEach(function (dx) {
      [-1, 1].forEach(function (dy) {
        [-1, 1].forEach(function (dz) {
          var geo = new T.BoxGeometry(size, size, size);
          // ordem dos materiais: +x, -x, +y, -y, +z, -z
          var mats = [
            dx > 0 ? teal : dark, dx < 0 ? teal : dark,
            dy > 0 ? yellow : dark, dy < 0 ? yellow : dark,
            dz > 0 ? purple : dark, dz < 0 ? purple : dark
          ];
          var m = new T.Mesh(geo, mats);
          m.position.set(dx * off, dy * off, dz * off);
          group.add(m);
        });
      });
    });
    this.el.setObject3D('mesh', group);
  },
  remove: function () { this.el.removeObject3D('mesh'); }
});


// ---------- Narracao por slide ----------
(function(){
  var player = new Audio();
  player.preload = 'none';
  var muted = false;
  var pend = null;
  player.addEventListener('ended', function(){ if(window.AUDIO) window.AUDIO.duck(false); });
  player.addEventListener('error', function(){ if(window.AUDIO) window.AUDIO.duck(false); });
  function two(n){ return (n<10?'0':'')+n; }
  window.NARR = {
    play: function(idx){
      if(muted) return;
      clearTimeout(pend);
      pend = setTimeout(function(){          // debounce: espera 400ms parado no slide
        try{
          player.pause();
          player.src = 'assets/narr/n-' + two(idx+1) + '.mp3';
          if(window.AUDIO) window.AUDIO.duck(true);
          var p = player.play();
          if(p && p.catch) p.catch(function(){ if(window.AUDIO) window.AUDIO.duck(false); });
        }catch(e){}
      }, 400);
    },
    stop: function(){ clearTimeout(pend); try{ player.pause(); }catch(e){} if(window.AUDIO) window.AUDIO.duck(false); },
    toggle: function(){
      muted = !muted;
      if(muted){ window.NARR.stop(); } else if(window.DECK){ window.NARR.play(window.DECK.index); }
      var lbl = document.getElementById('mutelabel');
      if(lbl) lbl.setAttribute('text', 'value', muted ? 'NARRACAO: OFF' : 'NARRACAO: ON');
      var pill = document.getElementById('mutepill');
      if(pill) pill.setAttribute('material', 'color', muted ? '#221033' : '#00A99D');
      return muted;
    },
    isMuted: function(){ return muted; }
  };
})();

<script>
(function(){
  var sc = document.querySelector('a-scene');
  var vrBtn = document.getElementById('btn-vr');
  var status = document.getElementById('xrstatus');
  function hideBootOverlay(){ var x=document.getElementById('boot'); if(x) x.style.display='none'; }
  function enter(useAR){
    if(window.__vrOk===false || !sc || !sc.enterVR){ hideBootOverlay(); return; }
    var p = sc.enterVR(useAR);
    if(p && p.catch){ p.catch(function(e){
      status.textContent = 'VR não iniciou: '+(e&&e.message?e.message:e)+' — mostrando em 3D.';
      hideBootOverlay();
    }); }
  }
  vrBtn.addEventListener('click', function(){ if(window.AUDIO) window.AUDIO.start(); enter(false); });
  // hide entry UI once a session starts / show again on exit
  if(sc){
    sc.addEventListener('enter-vr', function(){ var x=document.getElementById('boot'); if(x) x.style.display='none'; });
    sc.addEventListener('exit-vr',  function(){ var x=document.getElementById('boot'); if(x) x.style.display='flex'; });
  }
  // feature detection
  if(!navigator.xr){
    window.__vrOk=false; if(window.__tryEnable) window.__tryEnable();
    status.textContent = 'Sem VR neste navegador — modo 3D pela tela. Para imersivo, use o Meta Quest.';
    return;
  }
  status.textContent = '';
  Promise.allSettled([
    navigator.xr.isSessionSupported('immersive-ar'),
    navigator.xr.isSessionSupported('immersive-vr')
  ]).then(function(res){
    var arOk = res[0].status==='fulfilled' && res[0].value;
    var vrOk = res[1].status==='fulfilled' && res[1].value;
    window.__vrOk = !!vrOk; if(window.__tryEnable) window.__tryEnable();
    if(!vrOk){ status.textContent='Sem VR imersivo aqui — modo 3D pela tela.'; }
    else { status.textContent='Dispositivo sem suporte a AR/VR imersivo. Explore a cena em 3D pela tela.'; }
  });
})();

        try{
          if(env.hasLoaded){ env.setAttribute('environment', THEMES[name]); }
          else { env.addEventListener('loaded', function(){ try{ env.setAttribute('environment', THEMES[current]); }catch(e){} }, {once:true}); }
        }catch(e){ if(window.console) console.warn('tema falhou', name, e); }
      }
    }
    document.querySelectorAll('.tpill').forEach(function(p){
      var tp = p.getAttribute('theme-pick');
      var pn = (tp && tp.name) ? tp.name : String(tp||'').replace('name:','').trim();
      p.setAttribute('material', 'color', pn===name ? '#00A99D' : '#221033');
    });
  }
  window.APPLY_THEME = function(){ apply(current); };
  window.SET_THEME = apply;
  var ORDER = ['real','starry','tron','dream','forest','default'];
  window.CYCLE_THEME = function(){ apply(ORDER[(ORDER.indexOf(current)+1) % ORDER.length]); };
  var sc = document.querySelector('a-scene');
  if(sc){
    if(sc.hasLoaded){ apply(current); }
    else { sc.addEventListener('loaded', function(){ apply(current); }, {once:true}); }
    // re-assert chosen theme when entering VR (in case env rebuilt)
    sc.addEventListener('enter-vr', function(){ if(!sc.is('ar-mode')) apply(current); });
  } else { apply(current); }
})();
</script>
</body>
</html>
